# OpenTibiaBR RME Agent — Default Configuration
# V1.0.0 GA — Agente RME General Availability

environment: default
debug: false
log_level: INFO
profile: default

generation:
  max_tiles: 500000
  chunk_size: 128
  default_floor: 7
  min_level: 50
  max_level: 500
  enable_validation: true
  timeout_seconds: 300

lua:
  optimize: true
  minify: false
  comments: false
  validate_after_export: true

otbm:
  validate: true
  auto_export: true
  generate_templates: true
  item_major_version: 3
  item_minor_version: 57
  backup_before_write: true

quality:
  min_score: 80
  check_boundaries: true
  check_spawn_overlap: true
  max_errors: 5
  min_critic_score: 75

ai:
  enabled: true
  default_mode: auto
  triple_min_success: 2
  provider_order: [paxsenix, openrouter, custom, ollama]
  timeout_seconds: 35
  max_input_chars: 12000
  max_output_tokens: 1800
  providers:
    paxsenix:
      base_url: "https://api.paxsenix.org/v1"
      model: "gpt-5-nano"
    openrouter:
      base_url: "https://openrouter.ai/api/v1"
      model: "openrouter/free"
    custom:
      base_url: ""
      model: ""
    ollama:
      base_url: "http://127.0.0.1:11434"
      model: "minimax-m3:cloud"
      fallback_models: [nemotron-3-super:cloud]
      cloud_base_url: "https://ollama.com"
      cloud_model: "minimax-m3"
      cloud_fallback_models: [nemotron-3-super]

ollama:
  host: "http://localhost:11434"
  model: "qwen3:8b"
  temperature: 0.5
  timeout: 90
  enabled: false

paths:
  tibia: ""
  items_xml: ""
  monsters_dir: ""
  npcs_dir: ""
  output_dir: "output"
  data_dir: "data"
  templates_dir: "templates"
  logs_dir: "logs"
  exports_dir: "exports"
  cache_dir: "cache"

cache:
  enabled: true
  ttl_seconds: 7200
  max_size_mb: 512

benchmark:
  enabled: false
  iterations: 1
  worlds_per_run: 50

observability:
  enable_metrics: true
  enable_events: true
  export_metrics: true
  metrics_path: "metrics.json"
  health_path: "health_report.json"
  diagnostics_path: "diagnostics.json"

recovery:
  enable_checkpointing: true
  checkpoint_dir: ".checkpoint"
  max_checkpoints: 5
  auto_rollback_on_failure: true
