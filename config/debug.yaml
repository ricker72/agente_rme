# OpenTibiaBR RME Agent — Debug Configuration
# V1.0

environment: debug
debug: true
log_level: DEBUG

generation:
  max_tiles: 100000
  chunk_size: 64
  default_floor: 7
  min_level: 50
  max_level: 500

lua:
  optimize: false
  minify: false
  comments: true

otbm:
  validate: true
  auto_export: true
  generate_templates: true
  item_major_version: 3
  item_minor_version: 57

quality:
  min_score: 0
  check_boundaries: false
  check_spawn_overlap: false
  max_errors: 999

ollama:
  host: "http://localhost:11434"
  model: "qwen3:8b"
  temperature: 0.9
  timeout: 120

paths:
  tibia: ""
  items_xml: ""
  monsters_dir: ""
  npcs_dir: ""
  output_dir: "output"
  data_dir: "data"
  templates_dir: "templates"

cache:
  enabled: false
  ttl_seconds: 0
  max_size_mb: 16

benchmark:
  enabled: true
  iterations: 5