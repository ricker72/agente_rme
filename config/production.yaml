# OpenTibiaBR RME Agent — Production Configuration
# V1.0

environment: production
debug: false
log_level: INFO

generation:
  max_tiles: 500000
  chunk_size: 128
  default_floor: 7
  min_level: 50
  max_level: 500

lua:
  optimize: true
  minify: false
  comments: false

otbm:
  validate: true
  auto_export: true
  generate_templates: true
  item_major_version: 3
  item_minor_version: 57

quality:
  min_score: 80
  check_boundaries: true
  check_spawn_overlap: true
  max_errors: 5

ollama:
  host: "http://localhost:11434"
  model: "qwen3:8b"
  temperature: 0.5
  timeout: 90

paths:
  tibia: ""
  items_xml: ""
  monsters_dir: ""
  npcs_dir: ""
  output_dir: "output"
  data_dir: "data"
  templates_dir: "templates"

cache:
  enabled: true
  ttl_seconds: 7200
  max_size_mb: 512

benchmark:
  enabled: false
  iterations: 1